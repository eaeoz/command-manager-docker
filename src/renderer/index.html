<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Command Manager</title>
    <link rel="stylesheet" type="text/css" href="data/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            background-color: #000000;
        }
        h2 {
            text-shadow: 4px 4px 4px rgba(255,255,255, 0.5);
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }
        .quarter-circle-button {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 46px;
            background-color: #F44336;
            border-radius: 0 0 0 80px;
            cursor: pointer;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 1000;
        }
        .hamburger-icon {
            width: 25px;
            height: 3px;
            background-color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            left: 6px;
            bottom: 6px;
        }
        .hamburger-icon::before,
        .hamburger-icon::after {
            content: "";
            width: 25px;
            height: 3px;
            background-color: white;
            position: absolute;
        }
        .hamburger-icon::before { top: -10px; border-radius: 10px 10px 0 0; }
        .hamburger-icon::after { bottom: -10px; border-radius: 0 0 10px 10px; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            text-align: left;
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border: none;
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .close {
            color: #999;
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .close:hover { color: #333; background-color: #f5f5f5; }
        .tab {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
            padding-bottom: 0;
        }
        .tab button {
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 20px;
            transition: all 0.3s;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab button:hover { color: #333; background-color: #f8f8f8; border-radius: 8px 8px 0 0; }
        .tab button.active { color: #F44336; border-bottom-color: #F44336; }
        .tabcontent { display: none; padding: 0; border-top: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .command-container {
            flex: 1;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            align-content: flex-start;
            flex-direction: row;
            gap: 15px;
            overflow-y: auto;
            padding: 1px;
        }
        .command-card {
            box-shadow: 10px 5px 10px 5px rgba(0, 0, 0, 0.5) inset;
            border-radius: 50px;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 0;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #e2e2e2;
            position: relative;
            text-align: center;
            transform: scale(1.1);
        }
        .command-title-button {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.5);
            transform: scale(0.9) translateY(2px);
            border-radius: 50px;
            background: radial-gradient(ellipse at top, #e66465, transparent), radial-gradient(ellipse at bottom, #9198e5, transparent);
            color: white;
            border: none;
            width: 100%;
            height: 90%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .command-title-button:hover { background-color: #45a049; }
        .gear-icon, .url-icon {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 15%;
            cursor: pointer;
            padding-bottom: 5px;
            padding-top: 5px;
        }
        .gear-icon:hover { opacity: 0.5; }
        .url-icon:hover { translate: 0 6px; }
        .gear-icon img, .url-icon img { width: 25px; height: 25px; }
    </style>
</head>
<body>
    <div class="quarter-circle-button" id="openFormButton">
        <div class="hamburger-icon"></div>
    </div>
    <h2>Command Manager</h2>
    <div class="command-container" id="commandList"></div>

    <script>
        // Load commands and profiles
        async function loadData() {
            try {
                const [commandsRes, profilesRes] = await Promise.all([
                    fetch('/commands'),
                    fetch('/profiles')
                ]);
                const commands = await commandsRes.json();
                const profiles = await profilesRes.json();
                renderCommands(commands, profiles);
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }

        function renderCommands(commands, profiles) {
            const container = document.getElementById('commandList');
            container.innerHTML = commands.map(cmd => {
                const bgStyle = cmd.gradientColor && cmd.gradientColor !== cmd.backgroundColor ?
                    `background: linear-gradient(180deg, ${cmd.gradientColor} 0%, ${cmd.backgroundColor} 100%);` :
                    `background-color: ${cmd.backgroundColor};`;
                return `
                    <div class="command-card" data-line-number="${cmd.lineNumber}" oncontextmenu="openStyleModal(event, '${cmd.title}')">
                        ${cmd.url ? `
                        <div class="url-icon" onclick="window.open('${cmd.url}', '_blank')">
                            <img src="data/url.png" alt="Link">
                        </div>
                        ` : ''}
                        <button class="command-title-button" onclick="runCommand('${cmd.command}', '${cmd.profile}')" 
                            style="color:${cmd.textColor}; font-size:${cmd.fontSize}px; font-family:${cmd.fontType}; ${bgStyle}">
                            ${cmd.title}
                        </button>
                        <div class="gear-icon" onclick="toggleActions('${cmd.title}')">
                            <img src="data/gear.png" alt="Gear">
                        </div>
                        <div class="command-actions" id="actions-${cmd.title}" style="display:none;">
                            <button onclick="editCommand('${cmd.title}')">Edit</button>
                            <button onclick="deleteCommand('${cmd.title}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
