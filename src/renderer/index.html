<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Command Manager</title>
    <link rel="stylesheet" type="text/css" href="data/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        h2 {
            text-shadow: 4px 4px 4px rgba(255,255,255, 0.5);
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }
        .quarter-circle-button {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 46px;
            background-color: #F44336;
            border-radius: 0 0 0 80px;
            cursor: pointer;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 1000;
        }
        .hamburger-icon {
            width: 25px;
            height: 3px;
            background-color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            left: 6px;
            bottom: 6px;
        }
        .hamburger-icon::before,
        .hamburger-icon::after {
            content: "";
            width: 25px;
            height: 3px;
            background-color: white;
            position: absolute;
        }
        .hamburger-icon::before { top: -10px; border-radius: 10px 10px 0 0; }
        .hamburger-icon::after { bottom: -10px; border-radius: 0 0 10px 10px; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            text-align: left;
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border: none;
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .close {
            color: #999;
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .close:hover { color: #333; background-color: #f5f5f5; }
        .tab {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
            padding-bottom: 0;
        }
        .tab button {
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 20px;
            transition: all 0.3s;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab button:hover { color: #333; background-color: #f8f8f8; border-radius: 8px 8px 0 0; }
        .tab button.active { color: #F44336; border-bottom-color: #F44336; }
        .tabcontent { display: none; padding: 0; border-top: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
         .command-container {
             display: flex;
             justify-content: center;
             flex-wrap: wrap;
             align-content: flex-start;
             flex-direction: row;
             gap: 15px;
             overflow-y: auto;
             padding: 1px;
             min-height: 0;
         }
        .command-card {
            box-shadow: 10px 5px 10px 5px rgba(0, 0, 0, 0.5) inset;
            border-radius: 50px;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 0;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #e2e2e2;
            position: relative;
            text-align: center;
            transform: scale(1.1);
        }
        .command-title-button {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.5);
            transform: scale(0.9) translateY(2px);
            border-radius: 50px;
            background: radial-gradient(ellipse at top, #e66465, transparent), radial-gradient(ellipse at bottom, #9198e5, transparent);
            color: white;
            border: none;
            width: 100%;
            height: 90%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .command-title-button:hover { background-color: #45a049; }
        .gear-icon, .url-icon {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 15%;
            cursor: pointer;
            padding-bottom: 5px;
            padding-top: 5px;
        }
        .gear-icon:hover { opacity: 0.5; }
        .url-icon:hover { translate: 0 6px; }
        .gear-icon img, .url-icon img { width: 25px; height: 25px; }

        #accordion {
            margin-top: 6px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            margin-bottom: 5px;
        }

        .accordion-left, .accordion-center, .accordion-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 10;
        }

        .accordion-left {
            width: 25%;
            margin-top: 15px;
            pointer-events: auto;
            background: transparent;
        }

        .accordion-left input {
            pointer-events: auto !important;
            cursor: text !important;
            position: relative;
            z-index: 100;
            display: block;
            background: white;
            width: 100%;
            box-sizing: border-box;
        }

        .accordion-center {
            width: 40%;
            align-items: center;
        }

        .accordion-right {
            width: 25%;
            margin-top: 15px;
        }

        #puterPrompt {
            padding: 8px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
        }

        #sendPuterBtn {
            border-radius: 15px;
            padding: 10px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        #sendPuterBtn:hover {
            background-color: #1976D2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        #puterResponse {
            width: 100%;
            height: 160px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #e7f3fe;
            resize: none;
            box-sizing: border-box;
            user-select: text;
            font-family: Arial, sans-serif;
            font-size: 14px;
            opacity: 0.7;
        }

        #accordion > button#toggleButton {
            width: 100%;
            padding: 5px;
            background-color: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        #accordion > button#toggleButton:hover {
            background-color: #d32f2f;
        }

        #commandForm {
            border-radius: 20px;
            background-color: #e7f3fe;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            width: 100%;
        }

        #commandForm input {
            border-radius: 10px;
            width: 90%;
            margin: 5px;
            padding: 8px;
        }

        #commandForm button {
            border-radius: 15px;
            width: 90%;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transform: scale(0.8);
        }

        #commandForm button:hover {
            background-color: #45a049;
        }

        .edit-form {
            display: none;
            flex-direction: column;
            padding: 4px;
            gap: 5px;
        }

        .edit-form input {
            padding: 3px;
            width: 100%;
        }

        .edit-form button {
            padding: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .edit-form button:hover {
            background-color: #45a049;
        }

        .command-actions {
            display: none;
            height: 50%;
            justify-content: space-between;
        }

        .command-actions button {
            width: 60%;
            background-color: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            height: 100%;
        }

        .command-actions button.edit {
            background-color: #2196F3;
        }

        button.edit {
            transform: scale(0.8) translateX(10px);
        }

        button.delete {
            transform: scale(0.8) translateX(-10px);
        }

        .response-hint {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            text-align: center;
            font-style: italic;
        }

        .submitButton {
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }

        #accordion {
            margin-top: 6px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            margin-bottom: 5px;
        }

        .accordion-left, .accordion-center, .accordion-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .accordion-left { width: 25%; }

        .accordion-center {
            width: 40%;
            align-items: center;
        }

        .accordion-right { width: 25%; }

        #puterPrompt {
            padding: 8px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            cursor: text !important;
        }

        #sendPuterBtn {
            border-radius: 15px;
            padding: 10px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        #sendPuterBtn:hover {
            background-color: #1976D2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        #puterResponse {
            width:100%;
            height: 160px;
            padding:10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #e7f3fe;
            resize: none;
            box-sizing: border-box;
            user-select: text;
            font-family: Arial, sans-serif;
            font-size: 14px;
            opacity: 0.7;
            cursor: default;
            pointer-events: auto;
        }
     </style>
</head>
<body>
    <div class="quarter-circle-button" id="openFormButton">
        <div class="hamburger-icon"></div>
    </div>
    <h2>Command Manager</h2>
    <div class="command-container" id="commandList"></div>

    <div id="accordion" style="position:relative; z-index:100; width:90%; margin:0 auto;">
        <button id="toggleButton" onclick="toggleAccordion()">Add Command</button>
        <div id="accordionContent" style="display:none; width:100%;">
            <div style="display:flex; gap:20px; width:100%;">
                <div style="width:25%; margin-top:15px;">
                    <form onsubmit="event.preventDefault(); sendPuterRequest();" style="margin:0; padding:0;">
                        <textarea id="puterPrompt" placeholder="Ask AI..." rows="5" style="width:100%; padding:8px; border-radius:10px; border:1px solid #ccc; cursor:text; resize:vertical; box-sizing:border-box; font-family:Arial,sans-serif; font-size:14px;"></textarea>
                        <button id="sendPuterBtn" onclick="sendPuterRequest()" style="width:100%; margin-top:10px; padding:10px 15px; background-color:#2196F3; color:white; border:none; border-radius:15px; cursor:pointer;">Send to AI</button>
                    </form>
                </div>
                <div style="width:40%; display:flex; justify-content:center;">
                    <form id="commandForm" style="display:flex; flex-direction:column; align-items:center; width:100%; background-color:#e7f3fe; border-radius:20px; padding:10px;">
                    <input type="text" name="title" placeholder="Command Title" required style="width:90%; margin:5px; padding:8px; border-radius:10px;">
                    <input type="text" name="command" placeholder="Command" required style="width:90%; margin:5px; padding:8px; border-radius:10px;">
                    <input type="text" name="url" placeholder="URL (optional)" style="width:90%; margin:5px; padding:8px; border-radius:10px;">
                    <select name="profile" id="profileSelect" required style="width:90%; margin:5px; padding:8px; border-radius:10px;"></select>
                    <button type="submit" style="width:90%; padding:10px 15px; background-color:#4CAF50; color:white; border:none; border-radius:15px; cursor:pointer; transform:scale(0.8);">Add Command</button>
                    </form>
                </div>
                <div style="width:25%; margin-top:15px;">
                        <textarea id="puterResponse" readonly placeholder="AI response will appear here..." style="width:100%; height:220px; padding:10px; border-radius:5px; border:1px solid #ccc; background-color:#e7f3fe; resize:none; opacity:0.7; cursor:default;"></textarea>
                    <div class="response-hint">Right-click selected text to copy it to Command field</div>
                </div>
            </div>
        </div>
    </div>
            <div class="accordion-center">
                <form id="commandForm" style="display:flex; flex-direction:column; align-items:center; width:100%;">
                <input type="text" name="title" placeholder="Command Title" required>
                <input type="text" name="command" placeholder="Command" required>
                <input type="text" name="url" placeholder="URL (optional)">
                <select name="profile" id="profileSelect" required>
                </select>
                <button type="submit">Add Command</button>
                </form>
            </div>
            <div class="accordion-right">
                <textarea id="puterResponse" readonly placeholder="AI response will appear here..."></textarea>
                <div class="response-hint">Right-click selected text to copy it to Command field</div>
            </div>
        </div>
    </div>

    <div id="styleModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeStyleModal">&times;</span>
            <h2>Style Command</h2>
            <input type="hidden" id="styleCommandTitle">
            <div style="display:flex; flex-direction:column; gap:10px; text-align:left;">
                <label>Title: <input type="text" id="styleTitle" style="padding:5px; border-radius:5px; border:1px solid #ccc;" /></label>
                <label>Text Color: <input type="color" id="styleTextColor" value="#000000" /></label>
                <label>Background Color: <input type="color" id="styleBgColor" value="#e2e2e2" /></label>
                <label>Gradient Color: <input type="color" id="styleGradientColor" value="#e2e2e2" /></label>
                <label>Font Size: <input type="number" id="styleFontSize" value="16" min="10" max="50" /></label>
                <label>Font Type:
                    <select id="styleFontType">
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="Courier New, monospace">Courier New</option>
                        <option value="Verdana, sans-serif">Verdana</option>
                    </select>
                </label>
                <button onclick="saveStyle()" style="padding:10px; background-color:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer;">Save Style</button>
            </div>
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        document.getElementById('closeStyleModal').addEventListener('click', () => {
            document.getElementById('styleModal').style.display = 'none';
        });

        function saveStyle() {
            const oldTitle = document.getElementById('styleCommandTitle').value;
            const newTitle = document.getElementById('styleTitle').value;
            const textColor = document.getElementById('styleTextColor').value;
            const backgroundColor = document.getElementById('styleBgColor').value;
            const gradientColor = document.getElementById('styleGradientColor').value;
            const fontSize = document.getElementById('styleFontSize').value;
            const fontType = document.getElementById('styleFontType').value;
            fetch('/style', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oldTitle, newTitle, textColor, backgroundColor, gradientColor, fontSize, fontType })
            }).then(() => {
                document.getElementById('styleModal').style.display = 'none';
                location.reload();
            });
        }

        document.getElementById('commandForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                title: formData.get('title'),
                command: formData.get('command'),
                url: formData.get('url') || '',
                profile: formData.get('profile')
            };
            fetch('/commands', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => location.reload());
        });
        function toggleAccordion() {
            const content = document.getElementById('accordionContent');
            if (content) {
                const isVisible = content.style.display === 'flex';
                content.style.display = isVisible ? 'none' : 'flex';
                if (!isVisible) {
                    setTimeout(() => document.getElementById('puterPrompt').focus(), 100);
                }
            }
        }

        function sendPuterRequest() {
            const prompt = document.getElementById('puterPrompt').value;
            const responseArea = document.getElementById('puterResponse');
            if (!prompt) return;
            responseArea.value = 'Loading...';
            if (!puter.auth.isSignedIn()) {
                puter.auth.signIn().then(() => {
                    puter.ai.chat(prompt, { model: "gpt-5.4-nano" })
                        .then(response => { responseArea.value = response; })
                        .catch(err => { responseArea.value = 'Error: ' + err.message; });
                }).catch(err => { responseArea.value = 'Auth cancelled: ' + err.message; });
            } else {
                puter.ai.chat(prompt, { model: "gpt-5.4-nano" })
                    .then(response => { responseArea.value = response; })
                    .catch(err => { responseArea.value = 'Error: ' + err.message; });
            }
        }

        // Right-click on response to copy selected text to command input
        document.getElementById('puterResponse').addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const selectedText = window.getSelection().toString().trim();
            if (selectedText) {
                document.querySelector('#commandForm input[name="command"]').value = selectedText;
            }
        });

        // Ctrl+Enter or Cmd+Enter in prompt textarea sends to AI
        document.getElementById('puterPrompt').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                sendPuterRequest();
            }
        });

        function toggleActions(title) {
            const actions = document.getElementById('actions-' + title);
            actions.style.display = (actions.style.display === 'none' || actions.style.display === '') ? 'flex' : 'none';
        }

        function toggleEditForm(title, command, url) {
            const form = document.getElementById('editForm-' + title);
            const actions = document.getElementById('actions-' + title);
            const comTitle = document.getElementById('title-' + title);
            const editButton = document.getElementById('edit-' + title);
            const deleteButton = document.getElementById('delete-' + title);
            const urlTitle = document.getElementById('url-' + title);
            if (form.style.display === 'none' || form.style.display === '') {
                form.style.display = 'flex';
                actions.style.display = 'none';
                comTitle.style.display = 'none';
                editButton.textContent = 'return';
                deleteButton.style.display = 'none';
                if (urlTitle) urlTitle.style.display = 'none';
            } else {
                form.style.display = 'none';
                actions.style.display = 'flex';
                comTitle.style.display = 'flex';
                editButton.textContent = 'Edit';
                deleteButton.style.display = 'block';
                if (urlTitle) urlTitle.style.display = 'flex';
            }
        }

        function submitEditForm(event, oldTitle) {
            event.preventDefault();
            const newTitle = document.getElementById('editTitle-' + oldTitle).value;
            const newCommand = document.getElementById('editCommand-' + oldTitle).value;
            const newUrl = document.getElementById('editUrl-' + oldTitle).value;
            const newProfile = document.getElementById('editProfile-' + oldTitle).value;
            fetch('/edit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oldTitle, newTitle, newCommand, newUrl, newProfile })
            }).then(() => location.reload());
        }

        function runCommand(command, profileTitle) {
            fetch('/profiles')
                .then(response => response.json())
                .then(profiles => {
                    const selectedProfile = profiles.find(profile => profile.title === profileTitle);
                    if (!selectedProfile) {
                        alert('Profile "' + profileTitle + '" does not exist!');
                        return;
                    }
                    fetch('/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command, profileTitle })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) alert(data.error);
                    })
                    .catch(err => alert('Error: ' + err.message));
                });
        }

        function editCommand(title) {
            fetch('/commands')
                .then(res => res.json())
                .then(commands => {
                    const cmd = commands.find(c => c.title === title);
                    if (cmd) toggleEditForm(title, cmd.command, cmd.url);
                });
        }

        function deleteCommand(title) {
            if (!confirm('Delete command "' + title + '"?')) return;
            fetch('/commands/' + encodeURIComponent(title), { method: 'DELETE' })
                .then(() => location.reload());
        }

        function openStyleModal(event, title) {
            event.preventDefault();
            fetch('/commands')
                .then(res => res.json())
                .then(commands => {
                    const cmd = commands.find(c => c.title === title);
                    if (!cmd) return;
                    document.getElementById('styleCommandTitle').value = title;
                    document.getElementById('styleTitle').value = cmd.title || title;
                    document.getElementById('styleTextColor').value = cmd.textColor || '#000000';
                    document.getElementById('styleBgColor').value = cmd.backgroundColor || '#e2e2e2';
                    document.getElementById('styleGradientColor').value = cmd.gradientColor || '#e2e2e2';
                    document.getElementById('styleFontSize').value = cmd.fontSize || 16;
                    document.getElementById('styleFontType').value = cmd.fontType || 'Arial, sans-serif';
                    document.getElementById('styleModal').style.display = 'block';
                });
        }

        // Load commands and profiles
        async function loadData() {
            try {
                const [commandsRes, profilesRes] = await Promise.all([
                    fetch('/commands'),
                    fetch('/profiles')
                ]);
                const commands = await commandsRes.json();
                const profiles = await profilesRes.json();
                renderCommands(commands, profiles);
                populateProfileSelect(profiles);
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }

        function populateProfileSelect(profiles) {
            const select = document.getElementById('profileSelect');
            if (select) {
                select.innerHTML = profiles.map(profile => `
                    <option value="${profile.title}">${profile.title}</option>
                `).join('');
            }
        }

        function renderCommands(commands, profiles) {
            const container = document.getElementById('commandList');
            container.innerHTML = commands.map(cmd => {
                const bgStyle = cmd.gradientColor && cmd.gradientColor !== cmd.backgroundColor ?
                    `background: linear-gradient(180deg, ${cmd.gradientColor} 0%, ${cmd.backgroundColor} 100%);` :
                    `background-color: ${cmd.backgroundColor};`;
                return `
                    <div class="command-card" data-line-number="${cmd.lineNumber}" oncontextmenu="openStyleModal(event, '${cmd.title}')">
                        ${cmd.url ? `
                        <div class="url-icon" onclick="window.open('${cmd.url}', '_blank')">
                            <img src="data/url.png" alt="Link">
                        </div>
                        ` : ''}
                        <button class="command-title-button" onclick="runCommand('${cmd.command}', '${cmd.profile}')" 
                            style="color:${cmd.textColor}; font-size:${cmd.fontSize}px; font-family:${cmd.fontType}; ${bgStyle}">
                            ${cmd.title}
                        </button>
                        <div class="gear-icon" onclick="toggleActions('${cmd.title}')">
                            <img src="data/gear.png" alt="Gear">
                        </div>
                        <div class="command-actions" id="actions-${cmd.title}" style="display:none;">
                            <button class="edit" onclick="editCommand('${cmd.title}')">Edit</button>
                            <button class="delete" onclick="deleteCommand('${cmd.title}')">Delete</button>
                        </div>
                        <form class="edit-form" id="editForm-${cmd.title}" onsubmit="submitEditForm(event, '${cmd.title}')">
                            <input type="text" id="editTitle-${cmd.title}" value="${cmd.title}" placeholder="Title" required />
                            <input type="text" id="editCommand-${cmd.title}" value="${cmd.command}" placeholder="Command" required />
                            <input type="text" id="editUrl-${cmd.title}" value="${cmd.url || ''}" placeholder="URL" />
                            <select id="editProfile-${cmd.title}">
                                ${profiles.map(p => `<option value="${p.title}" ${p.title === cmd.profile ? 'selected' : ''}>${p.title}</option>`).join('')}
                            </select>
                            <button class="submitButton" type="submit">Save</button>
                        </form>
                    </div>
                `;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
